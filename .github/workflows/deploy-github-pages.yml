# Publica a build em GitHub Pages: https://galdinoivo-cpu.github.io/erp-esa-cgo/
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master, principal]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Não cancelar deploy em curso (evita estados estranhos na API do Pages)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: SPA fallback (GitHub Pages)
        run: cp dist/index.html dist/404.html

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
